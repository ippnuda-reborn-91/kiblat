<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiblat G2R Offline</title>
    <meta name="theme-color" content="#2e7d32">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22KiblatG2R%22,%22short_name%22:%22Kiblat%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#2e7d32%22}">
    
    <style>
        :root { --primary: #2e7d32; --accent: #e53935; }
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 350px; }
        .compass-ring { position: relative; width: 240px; height: 240px; margin: 20px auto; border-radius: 50%; border: 8px solid var(--primary); background: #fff; transition: transform 0.1s linear; }
        .dir { position: absolute; font-weight: 900; font-size: 20px; color: #333; }
        .n { top: 10px; left: 50%; transform: translateX(-50%); color: var(--accent); }
        .e { right: 15px; top: 50%; transform: translateY(-50%); }
        .s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .w { left: 15px; top: 50%; transform: translateY(-50%); }
        #qibla-needle { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .kaaba { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); font-size: 32px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
        #msg { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary); margin:0;">Kiblat G2R</h2>
    <div id="msg">Mengecek Sensor...</div>

    <div id="ring" class="compass-ring">
        <div class="dir n">U</div><div class="dir e">T</div><div class="dir s">S</div><div class="dir w">B</div>
        <div id="qibla-needle">
            <div class="kaaba">🕋</div>
            <div style="position:absolute; top:50%; left:50%; width:4px; height:70px; background:var(--primary); transform:translate(-50%,-100%); clip-path:polygon(50% 0%, 0% 100%, 100% 100%);"></div>
        </div>
    </div>

    <button id="btn">AKTIFKAN OFFLINE</button>
</div>

<script>
    // --- REGISTER SERVICE WORKER (UNTUK OFFLINE) ---
    if ('serviceWorker' in navigator) {
        const swCode = `
            const cacheName = 'g2r-kiblat-v1';
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['./'])));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    // --- LOGIKA APLIKASI ---
    const ring = document.getElementById('ring');
    const needle = document.getElementById('qibla-needle');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    let qiblaAngle = 0;

    btn.onclick = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            qiblaAngle = calcQibla(pos.coords.latitude, pos.coords.longitude);
            needle.style.transform = `rotate(${qiblaAngle}deg)`;
            initSensor();
        }, () => msg.innerText = "GPS Wajib Aktif");
    };

    function initSensor() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if (res === 'granted') window.addEventListener('deviceorientation', update, true);
            });
        } else {
            window.addEventListener('deviceorientationabsolute', update, true);
            window.addEventListener('deviceorientation', update, true);
        }
        btn.style.display = 'none';
        msg.innerText = "Aplikasi siap digunakan offline.";
    }

    function update(e) {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        if (heading != null) ring.style.transform = `rotate(${-heading}deg)`;
    }

    function calcQibla(lat, lng) {
        const p1 = lat * Math.PI/180;
        const p2 = 21.4225 * Math.PI/180;
        const dL = (39.8262 - lng) * Math.PI/180;
        const y = Math.sin(dL);
        const x = Math.cos(p1)*Math.tan(p2) - Math.sin(p1)*Math.cos(dL);
        return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
    }
</script>
</body>
</html>
