<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kompas Ippnuda</title>
    
    <meta name="theme-color" content="#2e7d32">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        :root { --primary: #2e7d32; --accent: #e53935; --bg: #f4f7f6; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 360px; }
        .compass-base { position: relative; width: 250px; height: 250px; margin: 20px auto; border-radius: 50%; border: 8px solid var(--primary); background: #fff; }
        .dir { position: absolute; font-weight: 900; font-size: 18px; color: #333; }
        .n { top: 10px; left: 50%; transform: translateX(-50%); color: var(--accent); }
        .e { right: 15px; top: 50%; transform: translateY(-50%); }
        .s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .w { left: 15px; top: 50%; transform: translateY(-50%); }
        #pointer-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: transform 0.1s linear; }
        .kaaba { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); font-size: 35px; }
        .needle { position: absolute; top: 50%; left: 50%; width: 5px; height: 85px; background: var(--primary); transform: translate(-50%, -100%); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        #error-box { display: none; background: #ffebee; color: #c62828; padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: bold; font-size: 13px; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #status { font-size: 12px; color: #666; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--primary); margin:0;">Kompas Ippnuda</h2>
    <div id="status">Siap digunakan</div>

    <div class="compass-base">
        <div class="dir n">U</div><div class="dir e">T</div><div class="dir s">S</div><div class="dir w">B</div>
        <div id="pointer-wrapper">
            <div class="kaaba">🕋</div>
            <div class="needle"></div>
        </div>
    </div>

    <div id="error-box">❌ SENSOR TIDAK DITEMUKAN<br>HP ini tidak mendukung fitur Magnetometer.</div>
    <button id="main-btn">AKTIFKAN ARAH</button>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
        });
    }

    const pointer = document.getElementById('pointer-wrapper');
    const btn = document.getElementById('main-btn');
    const status = document.getElementById('status');
    const errorBox = document.getElementById('error-box');
    let qiblaAngle = 0;
    let hasSensor = false;

    btn.onclick = () => {
        status.innerText = "Meminta GPS...";
        navigator.geolocation.getCurrentPosition(pos => {
            qiblaAngle = calcQibla(pos.coords.latitude, pos.coords.longitude);
            status.innerText = "Mengecek Sensor...";
            checkSensor();
        }, () => { status.innerText = "GPS Error!"; });
    };

    function checkSensor() {
        let timer = setTimeout(() => {
            if (!hasSensor) { errorBox.style.display = "block"; btn.style.display = "none"; status.style.display = "none"; }
        }, 3000);

        const detector = (e) => {
            let heading = e.webkitCompassHeading || e.alpha;
            if (heading !== null) {
                hasSensor = true;
                clearTimeout(timer);
                status.innerText = "Sensor Aktif (Offline)";
                btn.innerText = "RE-KALIBRASI";
                btn.onclick = () => location.reload();
                window.addEventListener('deviceorientationabsolute', handleMove, true);
                window.addEventListener('deviceorientation', handleMove, true);
            }
        };

        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if (res === 'granted') window.addEventListener('deviceorientation', detector, true);
            });
        } else {
            window.addEventListener('deviceorientation', detector, true);
        }
    }

    function handleMove(e) {
        let heading = e.webkitCompassHeading || (360 - e.alpha);
        if (heading != null) pointer.style.transform = `rotate(${qiblaAngle - heading}deg)`;
    }

    function calcQibla(lat, lng) {
        const p1 = lat * Math.PI/180, p2 = 21.4225 * Math.PI/180, dL = (39.8262 - lng) * Math.PI/180;
        const y = Math.sin(dL), x = Math.cos(p1)*Math.tan(p2) - Math.sin(p1)*Math.cos(dL);
        return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
    }
</script>
</body>
</html>
